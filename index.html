<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlys | Hub Oficial</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --primary: #ff4b2b; --secondary: #00d2ff; --neon: #39ff14; --bg: #050505; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; overflow-x: hidden; display: flex; flex-direction: column; align-items: center; padding: 20px 0; }
        
        #canvas-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; opacity: 0.3; pointer-events: none; }

        .container { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 92%; max-width: 450px; }
        
        .bento-item { 
            background: rgba(20, 20, 20, 0.9); backdrop-filter: blur(15px); border-radius: 24px; 
            padding: 20px; border: 1px solid rgba(255,255,255,0.1); transition: 0.3s;
            box-shadow: 0 8px 32px rgba(0,0,0,0.5); position: relative;
        }

        .profile-box { grid-column: span 2; text-align: center; border-bottom: 3px solid var(--primary); }
        .game-box { grid-column: span 2; padding: 0; height: 160px; overflow: hidden; border: 2px solid #333; }
        .social-box { grid-column: span 1; display: flex; flex-direction: column; gap: 8px; }
        .coffee-box { grid-column: span 1; display: flex; flex-direction: column; align-items: center; justify-content: center; cursor: pointer; }

        .profile-img { width: 85px; height: 85px; border-radius: 50%; border: 2px solid #fff; object-fit: cover; }
        .btn { padding: 10px; border-radius: 12px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; font-size: 14px; }
        .btn-insta { background: #E1306C; } .btn-whats { background: #25D366; } .btn-yt { background: #ff0000; }

        /* ENGINE DO JOGO - SEM BUGS */
        #game-container { width: 100%; height: 100%; position: relative; background: #000; cursor: pointer; touch-action: none; }
        #player { position: absolute; bottom: 0; left: 40px; font-size: 35px; transform: scaleX(-1); z-index: 10; line-height: 1; }
        #obstacle { position: absolute; bottom: 0; right: -50px; font-size: 25px; z-index: 10; line-height: 1; }
        #road { position: absolute; bottom: 0; width: 200%; height: 2px; background: repeating-linear-gradient(90deg, #444 0, #444 20px, transparent 20px, transparent 40px); }
        .road-moving { animation: road-anim 0.5s linear infinite; }
        @keyframes road-anim { from { left: 0; } to { left: -40px; } }
        #msg { position: absolute; inset: 0; background: rgba(0,0,0,0.8); display: flex; align-items: center; justify-content: center; color: var(--neon); font-weight: bold; text-align: center; z-index: 20; }
    </style>
</head>
<body>

<canvas id="canvas-bg"></canvas>

<div class="container">
    <div class="bento-item profile-box">
        <img src="20260207_132012[1].jpg" class="profile-img">
        <h2 style="margin: 10px 0 0;">CHARLYS</h2>
        <p style="font-size: 12px; color: var(--secondary); margin: 5px 0;">@inimigo_do_amigo.ofc</p>
    </div>

    <div class="bento-item game-box" id="game-click-area">
        <div id="game-container">
            <div id="score-text" style="position: absolute; top: 10px; left: 15px; font-weight: bold; z-index: 15;">0 KM</div>
            <div id="msg">TOQUE PARA ACELERAR</div>
            <div id="road"></div>
            <div id="player">🏍️</div>
            <div id="obstacle">🚧</div>
        </div>
    </div>

    <div class="bento-item social-box">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" class="btn btn-insta" target="_blank">Instagram</a>
        <a href="https://wa.me/5569992919920" class="btn btn-whats" target="_blank">WhatsApp</a>
    </div>

    <div class="bento-item coffee-box" onclick="addCoffee()">
        <span style="font-size: 25px;">☕</span>
        <span id="coffee-count" style="font-weight: bold;">0</span>
        <span style="font-size: 10px; opacity: 0.6;">CAFÉS</span>
    </div>
</div>

<script>
    // --- FUNDO PARALLAX ---
    const canvas = document.getElementById('canvas-bg');
    const ctx = canvas.getContext('2d');
    let pts = [];
    function init() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    class Pt {
        constructor() { this.x = Math.random()*canvas.width; this.y = Math.random()*canvas.height; this.v = Math.random()*0.5 + 0.2; }
        draw() { ctx.fillStyle = "#333"; ctx.beginPath(); ctx.arc(this.x, this.y, 1, 0, Math.PI*2); ctx.fill(); }
        update() { this.y += this.v; if(this.y > canvas.height) this.y = 0; }
    }
    for(let i=0; i<50; i++) pts.push(new Pt());
    function anim() { ctx.clearRect(0,0,canvas.width,canvas.height); pts.forEach(p=>{p.update(); p.draw();}); requestAnimationFrame(anim); }
    init(); anim();

    // --- GAME LOGIC (FIXED) ---
    let playing = false, score = 0, jumping = false, yVel = 0, playerY = 0;
    const gravity = 0.6, jumpForce = -12;
    
    const playerEl = document.getElementById('player'),
          obsEl = document.getElementById('obstacle'),
          roadEl = document.getElementById('road'),
          msgEl = document.getElementById('msg'),
          scoreEl = document.getElementById('score-text'),
          gameArea = document.getElementById('game-click-area');

    function handleInput(e) {
        e.preventDefault();
        if (!playing) { start(); }
        else if (!jumping) { 
            jumping = true; 
            yVel = jumpForce; 
        }
    }

    gameArea.addEventListener('mousedown', handleInput);
    gameArea.addEventListener('touchstart', handleInput);

    function start() {
        playing = true; score = 0; playerY = 0; yVel = 0; jumping = false;
        msgEl.style.display = 'none';
        roadEl.classList.add('road-moving');
        obsEl.style.right = '-50px';
        update();
    }

    function update() {
        if (!playing) return;

        // Física do Pulo
        if (jumping) {
            yVel += gravity;
            playerY -= yVel;
            if (playerY <= 0) {
                playerY = 0;
                jumping = false;
                yVel = 0;
            }
        }
        playerEl.style.bottom = playerY + 'px';

        // Movimento do Obstáculo
        let obsRight = parseFloat(obsEl.style.right) || -50;
        let speed = 7 + (score / 150);
        
        if (obsRight > 460) {
            obsRight = -50;
            score += 10;
            scoreEl.innerText = score + " KM";
        } else {
            obsRight += speed;
        }
        obsEl.style.right = obsRight + 'px';

        // COLISÃO PRECISA
        // No grid bento (450px), o player está a ~40px da esquerda. 
        // 450 - 40 - largura_moto = área de impacto
        if (obsRight > 320 && obsRight < 370 && playerY < 35) {
            gameOver();
            return;
        }

        // Troca de Veículo
        if (score >= 500) playerEl.innerText = '🚛';
        else if (score >= 200) playerEl.innerText = '🚀';
        else playerEl.innerText = '🏍️';

        requestAnimationFrame(update);
    }

    function gameOver() {
        playing = false;
        roadEl.classList.remove('road-moving');
        let hi = localStorage.getItem('hi') || 0;
        if (score > hi) localStorage.setItem('hi', score);
        msgEl.innerHTML = `BATEU!<br>${score} KM<br>RECORDE: ${localStorage.getItem('hi')}<br>TENTE DE NOVO`;
        msgEl.style.display = 'flex';
    }

    function addCoffee() {
        let c = parseInt(localStorage.getItem('coffees') || 0) + 1;
        localStorage.setItem('coffees', c);
        document.getElementById('coffee-count').innerText = c;
    }
    document.getElementById('coffee-count').innerText = localStorage.getItem('coffees') || 0;
</script>

</body>
</html>
