<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARLYS | ULTRA GAMER HUB v2.0</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- CORE DESIGN SYSTEM --- */
        :root {
            --primary: #ff3c00;
            --secondary: #00f2ff;
            --accent: #bcff00;
            --bg-deep: #020202;
            --glass: rgba(15, 15, 15, 0.85);
            --border-glow: rgba(255, 60, 0, 0.3);
            --font-head: 'Syncopate', sans-serif;
            --font-body: 'Rajdhani', sans-serif;
        }

        /* Reset & Base */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body {
            background: var(--bg-deep);
            color: #fff;
            font-family: var(--font-body);
            overflow-x: hidden;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 40px 15px;
        }

        /* Hi-Tech Background Canvas */
        #core-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            background: radial-gradient(circle at center, #0a0a0a 0%, #000 100%);
        }

        /* --- BENTO GRID ARCHITECTURE --- */
        .hub-container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            width: 100%;
            max-width: 1100px;
            z-index: 10;
        }

        .bento-item {
            background: var(--glass);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 45px;
            padding: 30px;
            position: relative;
            transition: all 0.5s cubic-bezier(0.2, 0.8, 0.2, 1);
            box-shadow: 0 30px 60px rgba(0,0,0,0.8);
            display: flex;
            flex-direction: column;
        }

        .bento-item:hover {
            transform: translateY(-15px) scale(1.02);
            border-color: var(--primary);
            box-shadow: 0 0 50px rgba(255, 60, 0, 0.2);
        }

        /* Profile Block */
        .profile-hero {
            grid-column: span 4;
            flex-direction: row;
            align-items: center;
            gap: 40px;
            background: linear-gradient(135deg, rgba(20,20,20,0.95) 0%, rgba(5,5,5,0.95) 100%);
            border-left: 5px solid var(--primary);
        }

        .avatar-wrapper {
            position: relative;
            width: 200px; height: 200px;
            flex-shrink: 0;
        }

        .avatar-frame {
            position: absolute;
            inset: -10px;
            border-radius: 50%;
            border: 2px dashed var(--primary);
            animation: rotateCW 10s linear infinite;
        }

        .avatar-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 8px solid var(--bg-deep);
            position: relative;
            z-index: 5;
        }

        .hero-text h1 {
            font-family: var(--font-head);
            font-size: 50px;
            font-weight: 700;
            letter-spacing: -2px;
            background: linear-gradient(to bottom, #fff 40%, #555);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* --- GAME ENGINE UI --- */
        .game-console {
            grid-column: span 4;
            height: 450px;
            background: #000;
            padding: 0;
            border: 2px solid #1a1a1a;
            position: relative;
            cursor: pointer;
        }

        #game-viewport {
            width: 100%; height: 100%;
            position: relative;
            overflow: hidden;
        }

        .hud-top {
            position: absolute;
            top: 30px; left: 30px; right: 30px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            z-index: 100;
        }

        .km-badge {
            background: rgba(0,0,0,0.8);
            padding: 10px 25px;
            border-radius: 15px;
            border-left: 4px solid var(--accent);
            font-family: var(--font-head);
            font-size: 24px;
        }

        #pilot {
            position: absolute;
            bottom: 50px; left: 100px;
            font-size: 80px;
            z-index: 50;
            filter: drop-shadow(0 0 15px var(--secondary));
            will-change: transform;
        }

        .obstacle {
            position: absolute;
            bottom: 50px; right: -120px;
            font-size: 50px;
            z-index: 50;
        }

        .road-anim {
            position: absolute;
            bottom: 0; width: 200%; height: 12px;
            background: repeating-linear-gradient(90deg, #222 0, #222 60px, #444 60px, #444 120px);
        }

        /* --- SOCIALS & STATS --- */
        .social-grid {
            grid-column: span 2;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .action-btn {
            height: 100%;
            border-radius: 30px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .btn-insta { background: radial-gradient(circle at 30% 107%, #fdf497 0%, #fdf497 5%, #fd5949 45%,#d6249f 60%,#285AEB 90%); }
        .btn-whats { background: #25D366; }

        .stat-card { text-align: center; justify-content: center; }
        .stat-num { font-family: var(--font-head); font-size: 40px; color: var(--primary); }
        .stat-label { font-size: 12px; text-transform: uppercase; letter-spacing: 2px; opacity: 0.5; }

        /* Notification System */
        #notify {
            position: fixed;
            bottom: 30px; right: 30px;
            z-index: 1000;
        }

        .toast {
            background: var(--primary);
            padding: 15px 30px;
            border-radius: 20px;
            margin-top: 10px;
            font-weight: 700;
            animation: slideIn 0.5s ease-out;
        }

        @keyframes rotateCW { 100% { transform: rotate(360deg); } }
        @keyframes slideIn { from { transform: translateX(100%); opacity: 0; } to { transform: translateX(0); opacity: 1; } }

        /* Mobile Adjustments */
        @media (max-width: 900px) {
            .hub-container { grid-template-columns: repeat(2, 1fr); }
            .profile-hero { grid-column: span 2; flex-direction: column; text-align: center; padding: 50px 20px; }
            .game-console { grid-column: span 2; height: 300px; }
            .hero-text h1 { font-size: 30px; }
        }
    </style>
</head>
<body>

<canvas id="core-canvas"></canvas>
<div id="notify"></div>

<div class="hub-container">
    
    <header class="bento-item profile-hero">
        <div class="avatar-wrapper">
            <div class="avatar-frame"></div>
            <img src="20260207_132012[1].jpg" class="avatar-img" alt="Charlys">
        </div>
        <div class="hero-text">
            <p style="color: var(--primary); font-weight: 700; letter-spacing: 5px;">OFFICIAL PROFILE</p>
            <h1>CHARLYS</h1>
            <div style="display: flex; gap: 10px; margin-top: 15px;">
                <span style="background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 10px; font-size: 12px;">TITAN 98</span>
                <span style="background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 10px; font-size: 12px;">GTA V</span>
                <span style="background: rgba(255,255,255,0.1); padding: 5px 15px; border-radius: 10px; font-size: 12px;">ETS 2</span>
            </div>
        </div>
    </header>

    <section class="bento-item game-console" id="game-click-area">
        <div id="game-viewport">
            <div class="hud-top">
                <div class="km-badge"><span id="live-score">0000</span> <small style="font-size: 10px;">KM</small></div>
                <div style="text-align: right;">
                    <p style="font-size: 10px; opacity: 0.5;">BEST RECORD</p>
                    <p id="best-score" style="font-family: var(--font-head); color: var(--secondary);">0</p>
                </div>
            </div>

            <div id="msg-overlay" style="position: absolute; inset: 0; background: rgba(0,0,0,0.9); z-index: 200; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h2 style="font-family: var(--font-head); color: var(--primary);">IGNITION OFF</h2>
                <p style="margin-top: 10px; opacity: 0.6;">CLIQUE PARA ACELERAR A MÁQUINA</p>
            </div>

            <div id="road" class="road-anim"></div>
            <div id="pilot">🏍️</div>
            <div id="obs" class="obstacle">🚧</div>
        </div>
    </section>

    <div class="bento-item social-grid">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="action-btn btn-insta" onclick="toast('Sistema Conectado ao Instagram')">
            <i class="fab fa-instagram"></i>
        </a>
        <a href="https://wa.me/5569992919920" target="_blank" class="action-btn btn-whats" onclick="toast('WhatsApp Iniciado')">
            <i class="fab fa-whatsapp"></i>
        </a>
    </div>

    <div class="bento-item stat-card" style="grid-column: span 1; cursor: pointer;" onclick="addCoffee()">
        <span style="font-size: 40px;">☕</span>
        <div class="stat-num" id="coffee-val">0</div>
        <div class="stat-label">Caffeine Level</div>
    </div>

    <div class="bento-item stat-card" style="grid-column: span 1;">
        <i class="fas fa-bolt" style="font-size: 30px; color: var(--accent); margin-bottom: 10px;"></i>
        <div class="stat-num" style="font-size: 20px; color: #fff;" id="rank-text">RECRUTA</div>
        <div class="stat-label">Driver Rank</div>
    </div>

</div>

<script>
    /**
     * MASTER ENGINE CONTROLLER
     */
    const sys = {
        active: false,
        score: 0,
        hi: localStorage.getItem('ultra_hi') || 0,
        coffees: localStorage.getItem('ultra_coffee') || 0,
        py: 0, pVel: 0, 
        isJumping: false,
        ox: -150,
        speed: 12,
        gravity: 1.5,
        jump: -25
    };

    const dom = {
        pilot: document.getElementById('pilot'),
        obs: document.getElementById('obs'),
        road: document.getElementById('road'),
        score: document.getElementById('live-score'),
        best: document.getElementById('best-score'),
        overlay: document.getElementById('msg-overlay'),
        area: document.getElementById('game-click-area'),
        coffee: document.getElementById('coffee-val'),
        rank: document.getElementById('rank-text'),
        notify: document.getElementById('notify'),
        canvas: document.getElementById('core-canvas')
    };

    // Initialize State
    dom.best.innerText = sys.hi;
    dom.coffee.innerText = sys.coffees;

    /**
     * VISUAL ENGINE - STARFIELD & GRID
     */
    const ctx = dom.canvas.getContext('2d');
    let stars = [];

    function initVisuals() {
        dom.canvas.width = window.innerWidth;
        dom.canvas.height = window.innerHeight;
        stars = [];
        for(let i=0; i<200; i++) {
            stars.push({
                x: Math.random() * dom.canvas.width,
                y: Math.random() * dom.canvas.height,
                s: Math.random() * 2,
                v: Math.random() * 2 + 0.5
            });
        }
    }

    function render() {
        ctx.fillStyle = '#020202';
        ctx.fillRect(0,0,dom.canvas.width, dom.canvas.height);
        
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        stars.forEach(s => {
            ctx.beginPath();
            ctx.arc(s.x, s.y, s.s, 0, Math.PI*2);
            ctx.fill();
            s.y += s.v;
            if(s.y > dom.canvas.height) s.y = -10;
        });
        requestAnimationFrame(render);
    }
    window.addEventListener('resize', initVisuals);
    initVisuals(); render();

    /**
     * TITAN ULTRA ENGINE
     */
    function update() {
        if(!sys.active) return;

        // Physics
        sys.pVel += sys.gravity;
        sys.py -= sys.pVel;
        if(sys.py <= 0) { sys.py = 0; sys.pVel = 0; sys.isJumping = false; }
        dom.pilot.style.transform = `translateY(${-sys.py}px) scaleX(-1)`;

        // Obstacle Loop
        sys.speed = 12 + (sys.score / 250);
        sys.ox += sys.speed;
        if(sys.ox > dom.area.offsetWidth + 150) {
            sys.ox = -100;
            sys.score += 10;
            dom.score.innerText = sys.score.toString().padStart(4, '0');
            checkMilestones();
        }
        dom.obs.style.right = sys.ox + 'px';

        // Collision: Advanced Hitbox logic
        let pRect = dom.pilot.getBoundingClientRect();
        let oRect = dom.obs.getBoundingClientRect();

        if (
            pRect.left < oRect.right - 25 &&
            pRect.right > oRect.left + 25 &&
            pRect.bottom > oRect.top + 25
        ) {
            crash();
            return;
        }

        dom.road.style.left = (-(Date.now() / 6) % 120) + 'px';
        requestAnimationFrame(update);
    }

    function crash() {
        sys.active = false;
        if(sys.score > sys.hi) {
            sys.hi = sys.score;
            localStorage.setItem('ultra_hi', sys.hi);
            toast('NOVO RECORDE ESTABELECIDO!');
        }
        dom.best.innerText = sys.hi;
        dom.overlay.style.display = 'flex';
        dom.overlay.innerHTML = `
            <h2 style="color:var(--primary); font-family:var(--font-head);">WASTED</h2>
            <p style="font-size:30px;">${sys.score} KM</p>
            <p style="opacity:0.5; font-size:12px;">TOQUE PARA REPARAR A TITAN</p>
        `;
    }

    function checkMilestones() {
        if(sys.score == 500) { toast('RANK UP: PILOTO EXPERIENTE'); dom.rank.innerText = 'PILOTO'; dom.pilot.innerText = '🚀'; }
        if(sys.score == 1500) { toast('RANK UP: LENDA DAS PISTAS'); dom.rank.innerText = 'LENDA'; dom.pilot.innerText = '🚛'; }
    }

    dom.area.addEventListener('mousedown', (e) => {
        e.preventDefault();
        if(!sys.active) {
            sys.active = true;
            sys.score = 0;
            sys.ox = -150;
            sys.py = 0;
            dom.overlay.style.display = 'none';
            dom.score.innerText = "0000";
            update();
        } else if(!sys.isJumping) {
            sys.isJumping = true;
            sys.pVel = sys.jump;
        }
    });

    /**
     * SYSTEMS
     */
    function addCoffee() {
        sys.coffees++;
        localStorage.setItem('ultra_coffee', sys.coffees);
        dom.coffee.innerText = sys.coffees;
        if(sys.coffees % 10 == 0) toast('NÍVEL DE CAFEÍNA CRÍTICO!');
    }

    function toast(txt) {
        const t = document.createElement('div');
        t.className = 'toast';
        t.innerText = txt;
        dom.notify.appendChild(t);
        setTimeout(() => t.remove(), 3000);
    }

</script>
</body>
</html>
