<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Charlys | The Legendary Driver Hub</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">

    <style>
        /* --- DESIGN SYSTEM: CYBER-BENTO --- */
        :root {
            --neon-red: #ff4b2b;
            --neon-blue: #00d2ff;
            --neon-green: #39ff14;
            --deep-black: #050505;
            --glass-bg: rgba(10, 10, 10, 0.9);
            --card-border: rgba(255, 255, 255, 0.05);
            --glow: 0 0 15px rgba(255, 75, 43, 0.5);
            --font-h: 'Orbitron', sans-serif;
            --font-b: 'Rajdhani', sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--deep-black);
            color: #f0f0f0;
            font-family: var(--font-b);
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* Canvas de Fundo - Space Engine */
        #render-bg {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
            filter: contrast(1.2);
        }

        /* Layout Grid Master */
        .container {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            grid-auto-rows: auto;
            gap: 20px;
            width: 100%;
            max-width: 1000px;
            animation: appEntry 1s cubic-bezier(0.19, 1, 0.22, 1);
        }

        @keyframes appEntry {
            from { opacity: 0; transform: scale(0.9) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* Base dos Cards Bento */
        .bento-card {
            background: var(--glass-bg);
            backdrop-filter: blur(25px);
            border: 1px solid var(--card-border);
            border-radius: 40px;
            padding: 30px;
            position: relative;
            overflow: hidden;
            transition: all 0.6s cubic-bezier(0.165, 0.84, 0.44, 1);
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.7);
        }

        .bento-card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 100%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transition: 0.5s;
        }

        .bento-card:hover::before { left: 100%; }

        .bento-card:hover {
            transform: translateY(-12px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2);
        }

        /* --- PERFIL HEADER --- */
        .header-profile {
            grid-column: span 4;
            display: flex;
            align-items: center;
            gap: 40px;
            padding: 40px;
            background: linear-gradient(135deg, rgba(20,20,20,0.8) 0%, rgba(5,5,5,0.9) 100%);
        }

        .avatar-box {
            position: relative;
            width: 180px; height: 180px;
            flex-shrink: 0;
        }

        .avatar-main {
            width: 100%; height: 100%;
            border-radius: 50%;
            object-fit: cover;
            border: 5px solid var(--deep-black);
            z-index: 10;
            position: relative;
        }

        .ring-anim {
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            background: conic-gradient(from 0deg, var(--neon-red), var(--neon-blue), var(--neon-green), var(--neon-red));
            animation: spin 4s linear infinite;
        }

        @keyframes spin { 100% { transform: rotate(360deg); } }

        .profile-info h1 {
            font-family: var(--font-h);
            font-size: 48px;
            font-weight: 900;
            letter-spacing: 5px;
            text-transform: uppercase;
            background: linear-gradient(to right, #fff, #888);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .badge-container {
            display: flex;
            gap: 15px;
            margin-top: 20px;
        }

        .badge-pill {
            padding: 8px 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            color: var(--neon-blue);
            border: 1px solid rgba(0, 210, 255, 0.2);
            display: flex; align-items: center; gap: 8px;
        }

        /* --- GAME SECTION: TITAN CORE ENGINE --- */
        .game-area {
            grid-column: span 4;
            height: 350px;
            padding: 0;
            background: #000;
            border: 4px solid #111;
        }

        #game-canvas-wrap {
            width: 100%; height: 100%;
            position: relative;
            overflow: hidden;
        }

        .game-ui {
            position: absolute;
            top: 30px; left: 30px;
            z-index: 100;
        }

        .km-counter {
            font-family: 'Orbitron';
            font-size: 32px;
            color: var(--neon-green);
            text-shadow: 0 0 20px var(--neon-green);
        }

        #pilot-sprite {
            position: absolute;
            bottom: 40px; left: 100px;
            font-size: 70px;
            z-index: 50;
            transition: transform 0.1s;
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.3));
        }

        .road-system {
            position: absolute;
            bottom: 0; width: 200%; height: 10px;
            background: repeating-linear-gradient(90deg, #333 0, #333 50px, transparent 50px, transparent 100px);
        }

        .game-overlay-screen {
            position: absolute;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }

        /* --- INFO CARDS --- */
        .card-sm { grid-column: span 1; text-align: center; }
        .card-md { grid-column: span 2; }

        .stat-val {
            font-family: var(--font-h);
            font-size: 36px;
            display: block;
            margin: 10px 0;
        }

        .btn-action {
            width: 100%;
            padding: 20px;
            border-radius: 20px;
            border: none;
            cursor: pointer;
            font-family: var(--font-h);
            font-weight: 900;
            font-size: 14px;
            transition: 0.3s;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            text-decoration: none;
            color: #fff;
        }

        .ig-btn { background: linear-gradient(45deg, #f09433, #dc2743, #bc1888); }
        .wa-btn { background: #25D366; }
        
        .coffee-btn {
            background: #6f4e37;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }

        /* --- MOBILE ADAPTATION --- */
        @media (max-width: 768px) {
            .container { grid-template-columns: repeat(2, 1fr); }
            .header-profile { grid-column: span 2; flex-direction: column; text-align: center; }
            .game-area { grid-column: span 2; height: 250px; }
            .card-md { grid-column: span 2; }
            .profile-info h1 { font-size: 32px; }
        }

    </style>
</head>
<body>

    <canvas id="render-bg"></canvas>

    <div class="container">
        
        <header class="bento-card header-profile">
            <div class="avatar-box">
                <div class="ring-anim"></div>
                <img src="20260207_132012[1].jpg" class="avatar-main" alt="Charlys Logo">
            </div>
            <div class="profile-info">
                <h1>Charlys</h1>
                <p style="letter-spacing: 2px; opacity: 0.7; font-weight: 700;">SUPREME PILOT & DEVELOPER</p>
                <div class="badge-container">
                    <div class="badge-pill" id="b-1"><i class="fas fa-bolt"></i> TITAN 98</div>
                    <div class="badge-pill" id="b-2"><i class="fas fa-truck"></i> ETS2 PRO</div>
                    <div class="badge-pill" id="b-3"><i class="fas fa-code"></i> HUB ELITE</div>
                </div>
            </div>
        </header>

        <main class="bento-card game-area" id="game-trigger">
            <div id="game-canvas-wrap">
                <div class="game-ui">
                    <div class="km-counter" id="km-text">0000 KM</div>
                    <p style="font-size: 10px; font-weight: bold; opacity: 0.5;">HI-SCORE: <span id="hi-text">0</span> KM</p>
                </div>

                <div id="game-overlay" class="game-overlay-screen">
                    <h2 style="font-family: var(--font-h); color: var(--neon-red); font-size: 30px;">ENGINE OFFLINE</h2>
                    <p style="margin-top: 15px; font-weight: bold; letter-spacing: 1px;">CLIQUE PARA DAR A PARTIDA NA TITAN</p>
                    <div style="margin-top: 20px; font-size: 12px; opacity: 0.4;">USE O CLIQUE/TOQUE PARA PULAR OS OBSTÁCULOS</div>
                </div>

                <div id="road-layer" class="road-system"></div>
                <div id="pilot-sprite">🏍️</div>
                <div id="hazard-sprite" style="position: absolute; bottom: 40px; right: -100px; font-size: 50px;">🚧</div>
            </div>
        </main>

        <div class="bento-card card-md">
            <h3 style="margin-bottom: 20px; font-family: var(--font-h); font-size: 14px;">CONNECT SYSTEMS</h3>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="btn-action ig-btn">
                    <i class="fab fa-instagram"></i> INSTAGRAM
                </a>
                <a href="https://wa.me/5569992919920" target="_blank" class="btn-action wa-btn">
                    <i class="fab fa-whatsapp"></i> WHATSAPP
                </a>
            </div>
        </div>

        <div class="bento-card card-sm coffee-btn" onclick="addFuel()">
            <span style="font-size: 40px;">☕</span>
            <span class="stat-val" id="fuel-count">0</span>
            <p style="font-size: 10px; font-weight: 900; opacity: 0.7;">COFFEE FUEL</p>
        </div>

        <div class="bento-card card-sm">
            <i class="fas fa-trophy" style="color: gold; font-size: 30px;"></i>
            <span class="stat-val" style="font-size: 24px;" id="rank-name">NOOB</span>
            <p style="font-size: 10px; font-weight: 900; opacity: 0.5;">PILOT RANK</p>
        </div>

    </div>

    <script>
        /**
         * GLOBAL ENGINE SETTINGS
         */
        const state = {
            gameActive: false,
            score: 0,
            highScore: localStorage.getItem('charlys_pro_hi') || 0,
            coffee: parseInt(localStorage.getItem('charlys_coffee')) || 0,
            playerY: 0,
            jumpVel: 0,
            isJumping: false,
            hazardX: -100,
            gameSpeed: 10,
            gravity: 1.2,
            jumpPower: -22
        };

        // DOM Elements
        const el = {
            bg: document.getElementById('render-bg'),
            pilot: document.getElementById('pilot-sprite'),
            hazard: document.getElementById('hazard-sprite'),
            km: document.getElementById('km-text'),
            hi: document.getElementById('hi-text'),
            overlay: document.getElementById('game-overlay'),
            trigger: document.getElementById('game-trigger'),
            road: document.getElementById('road-layer'),
            fuel: document.getElementById('fuel-count'),
            rank: document.getElementById('rank-name')
        };

        el.hi.innerText = state.highScore;
        el.fuel.innerText = state.coffee;

        /**
         * BACKGROUND ENGINE - STARFIELD 3D
         */
        const ctx = el.bg.getContext('2d');
        let particles = [];

        function initStars() {
            el.bg.width = window.innerWidth;
            el.bg.height = window.innerHeight;
            particles = [];
            for(let i=0; i<150; i++) {
                particles.push({
                    x: Math.random() * el.bg.width,
                    y: Math.random() * el.bg.height,
                    z: Math.random() * el.bg.width,
                    size: Math.random() * 2
                });
            }
        }

        function drawStars() {
            ctx.fillStyle = '#050505';
            ctx.fillRect(0,0,el.bg.width, el.bg.height);
            
            particles.forEach(p => {
                let x = (p.x - el.bg.width/2) * (el.bg.width/p.z) + el.bg.width/2;
                let y = (p.y - el.bg.height/2) * (el.bg.width/p.z) + el.bg.height/2;
                let s = p.size * (el.bg.width/p.z);
                
                ctx.fillStyle = `rgba(255,255,255,${1 - p.z/el.bg.width})`;
                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI*2);
                ctx.fill();
                
                p.z -= 5;
                if(p.z <= 0) p.z = el.bg.width;
            });
            requestAnimationFrame(drawStars);
        }

        window.addEventListener('resize', initStars);
        initStars(); drawStars();

        /**
         * GAME ENGINE - CORE LOOP
         */
        function gameLoop() {
            if(!state.gameActive) return;

            // FÍSICA DE PULO
            if(state.isJumping) {
                state.jumpVel += state.gravity;
                state.playerY -= state.jumpVel;
                
                if(state.playerY <= 0) {
                    state.playerY = 0;
                    state.jumpVel = 0;
                    state.isJumping = false;
                }
            }
            el.pilot.style.transform = `translateY(${-state.playerY}px) scaleX(-1)`;

            // OBSTÁCULOS E DIFICULDADE
            state.gameSpeed = 10 + (state.score / 200);
            state.hazardX += state.gameSpeed;
            
            if(state.hazardX > (el.trigger.offsetWidth + 100)) {
                state.hazardX = -100;
                state.score += 10;
                updateUI();
            }
            el.hazard.style.right = state.hazardX + 'px';

            // DETECÇÃO DE COLISÃO AABB PROFISSIONAL
            // Convertemos coordenadas do container para hitbox relativa
            const rectPilot = el.pilot.getBoundingClientRect();
            const rectHazard = el.hazard.getBoundingClientRect();

            if (
                rectPilot.left < rectHazard.right - 20 &&
                rectPilot.right > rectHazard.left + 20 &&
                rectPilot.bottom > rectHazard.top + 20
            ) {
                gameOver();
                return;
            }

            // ANIMAÇÃO DE CENÁRIO
            el.road.style.left = (-(Date.now()/5) % 100) + 'px';

            requestAnimationFrame(gameLoop);
        }

        function updateUI() {
            el.km.innerText = state.score.toString().padStart(4, '0') + " KM";
            
            // Evolução de Veículo
            if(state.score >= 1000) {
                el.pilot.innerText = '🚛';
                el.rank.innerText = 'TRUCKER';
                el.rank.style.color = 'var(--neon-blue)';
            } else if(state.score >= 400) {
                el.pilot.innerText = '🚀';
                el.rank.innerText = 'PILOT';
                el.rank.style.color = 'var(--neon-green)';
            } else {
                el.pilot.innerText = '🏍️';
                el.rank.innerText = 'NOOB';
            }
        }

        function gameOver() {
            state.gameActive = false;
            if(state.score > state.highScore) {
                state.highScore = state.score;
                localStorage.setItem('charlys_pro_hi', state.highScore);
            }
            el.hi.innerText = state.highScore;
            el.overlay.innerHTML = `<h2 style="color:var(--neon-red)">WASTED</h2><p style="font-size:24px">${state.score} KM</p><small>TOQUE PARA REPARAR A TITAN</small>`;
            el.overlay.style.display = 'flex';
        }

        function startGame() {
            state.gameActive = true;
            state.score = 0;
            state.hazardX = -100;
            state.playerY = 0;
            el.overlay.style.display = 'none';
            updateUI();
            gameLoop();
        }

        el.trigger.addEventListener('touchstart', handleAction);
        el.trigger.addEventListener('mousedown', handleAction);

        function handleAction(e) {
            e.preventDefault();
            if(!state.gameActive) startGame();
            else if(!state.isJumping) {
                state.isJumping = true;
                state.jumpVel = state.jumpPower;
            }
        }

        /**
         * PROGRESSION SYSTEM
         */
        function addFuel() {
            state.coffee++;
            localStorage.setItem('charlys_coffee', state.coffee);
            el.fuel.innerText = state.coffee;
            
            // Efeito visual de clique
            el.fuel.style.transform = 'scale(1.5)';
            setTimeout(() => el.fuel.style.transform = 'scale(1)', 100);
        }

    </script>
</body>
</html>
