<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARLYS_OS // MULTI-CORE</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@300;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #00f2ff; --s: #ff0055; --a: #bcff00;
            --bg: #050508; --glass: rgba(10, 10, 15, 0.9);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background-color: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- BACKGROUND DINÂMICO --- */
        #starfield { position: fixed; top:0; left:0; z-index: -1; }

        /* --- HEADER RESPONSIVO --- */
        .top-nav {
            height: 60px; background: var(--glass);
            border-bottom: 1px solid var(--p);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 20px; backdrop-filter: blur(10px);
            z-index: 100;
        }

        /* --- LAYOUT GRID FLEXÍVEL --- */
        .main-container {
            display: grid;
            grid-template-columns: 300px 1fr 300px;
            gap: 15px;
            padding: 15px;
            height: calc(100vh - 60px);
            transition: 0.5s;
        }

        .panel {
            background: var(--glass);
            border: 1px solid rgba(0, 242, 255, 0.1);
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* --- ADAPTAÇÃO PARA CELULAR (BREAKPOINT) --- */
        @media (max-width: 1100px) {
            .main-container {
                grid-template-columns: 1fr;
                grid-template-rows: auto 1fr auto;
                overflow-y: auto;
            }
            .side-panel { display: none; } /* Esconde laterais no mobile para focar no jogo */
            .mobile-only { display: block; }
        }

        /* --- GAME VIEWPORT ADAPTATIVO --- */
        .viewport {
            background: #000;
            border: 1px solid var(--s);
            position: relative;
            min-height: 300px;
        }

        canvas { width: 100%; height: 100%; display: block; }

        /* --- CONTROLES TOUCH (SÓ APARECEM NO MOBILE) --- */
        .touch-controls {
            display: none;
            position: absolute; bottom: 20px; width: 100%;
            padding: 0 30px; justify-content: center;
        }
        @media (max-width: 1100px) { .touch-controls { display: flex; } }

        .jump-btn {
            width: 80px; height: 80px; background: rgba(255, 0, 85, 0.3);
            border: 2px solid var(--s); border-radius: 50%;
            color: white; font-size: 24px; display: flex; align-items: center; justify-content: center;
        }

        /* --- BOTÕES CYBER --- */
        .btn {
            background: transparent; border: 1px solid var(--p); color: var(--p);
            padding: 12px; font-family: 'Orbitron'; cursor: pointer;
            text-decoration: none; text-align: center; margin: 5px;
            font-size: 12px; transition: 0.3s;
        }
        .btn:active { background: var(--p); color: #000; }

        /* --- ANIMATIONS --- */
        .glow { animation: pulse 2s infinite alternate; }
        @keyframes pulse { from { box-shadow: 0 0 5px var(--p); } to { box-shadow: 0 0 20px var(--p); } }
    </style>
</head>
<body onload="init()">

    <canvas id="starfield"></canvas>

    <header class="top-nav">
        <div style="font-family: 'Orbitron'; color: var(--p); font-weight: 900; font-size: 14px;">CHARLYS_HYBRID_OS</div>
        <div id="clock" style="color: var(--a);">00:00:00</div>
    </header>

    <main class="main-container">
        
        <aside class="panel side-panel">
            <div style="padding: 20px; text-align: center;">
                <img src="20260207_132012[1].jpg" style="width: 120px; border-radius: 50%; border: 2px solid var(--p); margin-bottom: 15px;">
                <h3 style="font-family: 'Orbitron';">CHARLYS</h3>
                <p style="font-size: 10px; color: var(--s);">MODO: MULTIPLATAFORMA</p>
                <div style="margin-top: 20px; display: flex; flex-direction: column;">
                    <a href="https://instagram.com/inimigo_do_amigo.ofc" class="btn">INSTAGRAM</a>
                    <a href="https://wa.me/5569992919920" class="btn">WHATSAPP</a>
                </div>
            </div>
        </aside>

        <section class="panel viewport glow">
            <canvas id="game"></canvas>
            <div id="ui-overlay" style="position: absolute; top: 20px; left: 20px;">
                <div id="score" style="font-family: 'Orbitron'; font-size: 30px;">0000</div>
            </div>
            
            <div class="touch-controls">
                <div class="jump-btn" onclick="jump()"><i class="fas fa-arrow-up"></i></div>
            </div>

            <div id="boot-screen" style="position: absolute; inset: 0; background: #000; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                <h1 style="font-family: 'Orbitron'; color: var(--p); margin-bottom: 20px;">SYSTEM READY</h1>
                <button onclick="start()" class="btn" style="width: 200px;">START_SIMULATION</button>
            </div>
        </section>

        <aside class="panel side-panel">
            <div style="padding: 20px;">
                <h4 style="font-size: 12px; color: var(--a);">ENGINE_STATS</h4>
                <div id="stats" style="font-size: 10px; margin-top: 10px; line-height: 2;">
                    - RESOLUTION: AUTO_DETECT<br>
                    - PLATFORM: <span id="platform-id">DEVICE</span><br>
                    - KERNEL: V6.0_HYBRID
                </div>
                <hr style="margin: 15px 0; border: 0; border-top: 1px solid rgba(255,255,255,0.1);">
                <button class="btn" onclick="toggleAudio()">RADIO: ON/OFF</button>
                <audio id="bg-audio" loop src="https://stream.nightride.fm/nightride.mp3"></audio>
            </div>
        </aside>

    </main>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        let gameActive = false, score = 0, y = 0, vy = 0, obs = [], frame = 0;

        function init() {
            // Relógio
            setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
            document.getElementById('platform-id').innerText = /Mobi|Android/i.test(navigator.userAgent) ? "MOBILE" : "DESKTOP";
            
            // Estrelas de fundo
            const sCanvas = document.getElementById('starfield');
            const sCtx = sCanvas.getContext('2d');
            sCanvas.width = window.innerWidth; sCanvas.height = window.innerHeight;
            function drawStars() {
                sCtx.fillStyle = 'black'; sCtx.fillRect(0,0,sCanvas.width, sCanvas.height);
                sCtx.fillStyle = 'white';
                for(let i=0; i<100; i++) sCtx.fillRect(Math.random()*sCanvas.width, Math.random()*sCanvas.height, 1, 1);
                requestAnimationFrame(drawStars);
            }
            drawStars();
        }

        function start() {
            gameActive = true; score = 0; obs = [];
            document.getElementById('boot-screen').style.display = 'none';
            loop();
        }

        function jump() { if(y === 0) vy = -15; }

        function loop() {
            if(!gameActive) return;
            canvas.width = canvas.parentElement.offsetWidth;
            canvas.height = canvas.parentElement.offsetHeight;
            const ground = canvas.height - 40;
            ctx.clearRect(0,0,canvas.width, canvas.height);

            // Física
            vy += 0.8; y += vy;
            if(y > 0) { y = 0; vy = 0; }

            // Desenhar Moto (Adaptativo)
            ctx.font = canvas.width < 500 ? "30px Arial" : "50px Arial";
            ctx.fillText("🏍️", 50, ground + y);

            // Obstáculos
            if(frame % 100 === 0) obs.push({x: canvas.width, t: "🚧"});
            obs.forEach((o, i) => {
                o.x -= 7;
                ctx.fillText(o.t, o.x, ground);
                if(o.x > 50 && o.x < 90 && y > -20) { gameActive = false; document.getElementById('boot-screen').style.display = 'flex'; }
                if(o.x < -50) { obs.splice(i, 1); score += 10; }
            });

            document.getElementById('score').innerText = score.toString().padStart(4, '0');
            frame++; requestAnimationFrame(loop);
        }

        function toggleAudio() {
            const a = document.getElementById('bg-audio');
            a.paused ? a.play() : a.pause();
        }

        window.onkeydown = (e) => { if(e.code === 'Space') jump(); };
    </script>
</body>
</html>
