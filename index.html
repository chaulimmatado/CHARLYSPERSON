<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlys | The Ultimate Gamer Hub</title>
    
    <meta name="description" content="Perfil oficial do Charlys - Piloto de Titan 98 e entusiasta de ETS2 & GTA V.">
    <meta property="og:title" content="Charlys | Hub Oficial">
    <meta property="og:image" content="20260207_132012[1].jpg">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        /* --- VARIÁVEIS GLOBAIS --- */
        :root {
            --primary: #ff4b2b;
            --secondary: #00d2ff;
            --neon-green: #39ff14;
            --bg-dark: #050505;
            --card-bg: rgba(15, 15, 15, 0.95);
            --transition-speed: 0.4s;
        }

        /* --- RESET & BASE --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-dark);
            color: #fff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px 0;
        }

        /* --- BACKGROUND ANIMADO (PARTÍCULAS) --- */
        #bg-canvas {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: -1;
        }

        /* --- LAYOUT BENTO GRID --- */
        .bento-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-auto-rows: auto;
            gap: 15px;
            width: 95%;
            max-width: 500px;
            animation: fadeIn 1s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .bento-card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 28px;
            padding: 20px;
            position: relative;
            overflow: hidden;
            transition: all var(--transition-speed);
            box-shadow: 0 10px 40px rgba(0,0,0,0.6);
        }

        .bento-card:hover {
            transform: translateY(-5px);
            border-color: var(--primary);
            box-shadow: 0 0 25px rgba(255, 75, 43, 0.3);
        }

        /* --- BLOCO PERFIL --- */
        .profile-block { grid-column: span 2; text-align: center; }
        .profile-img-wrapper {
            position: relative;
            width: 110px; height: 110px;
            margin: 0 auto 15px;
        }
        .profile-img {
            width: 100%; height: 100%;
            border-radius: 50%;
            border: 3px solid #fff;
            object-fit: cover;
            cursor: pointer;
            z-index: 2;
            position: relative;
        }
        /* Efeito de brilho giratório atrás da foto */
        .profile-img-wrapper::after {
            content: '';
            position: absolute;
            top: -5px; left: -5px; right: -5px; bottom: -5px;
            border-radius: 50%;
            background: linear-gradient(45deg, var(--primary), var(--secondary), var(--neon-green));
            z-index: 1;
            animation: spin 4s linear infinite;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .badges-row { display: flex; justify-content: center; gap: 12px; margin-bottom: 10px; }
        .badge { font-size: 20px; filter: grayscale(1) opacity(0.2); transition: 0.5s; }
        .badge.unlocked { filter: grayscale(0) opacity(1); transform: scale(1.2); }

        /* --- BLOCO JOGO (O CORAÇÃO DO SITE) --- */
        .game-block {
            grid-column: span 2;
            height: 200px;
            padding: 0;
            background: #000;
            border: 2px solid #222;
            cursor: pointer;
        }
        #game-canvas-container {
            width: 100%; height: 100%;
            position: relative;
            overflow: hidden;
        }
        #player-sprite {
            position: absolute;
            bottom: 15px; left: 40px;
            font-size: 40px;
            transform: scaleX(-1);
            z-index: 10;
            line-height: 1;
        }
        #obstacle-sprite {
            position: absolute;
            bottom: 15px; right: -60px;
            font-size: 30px;
            z-index: 10;
        }
        .road-line {
            position: absolute;
            bottom: 0; width: 200%; height: 4px;
            background: repeating-linear-gradient(90deg, #333 0, #333 30px, transparent 30px, transparent 60px);
        }
        #game-overlay {
            position: absolute; inset: 0;
            background: rgba(0,0,0,0.8);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            z-index: 30;
            color: var(--neon-green);
            font-weight: bold;
            text-shadow: 0 0 10px var(--neon-green);
        }
        /* Efeito de scanline (monitor CRT) */
        .scanlines {
            position: absolute; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.1) 50%),
                        linear-gradient(90deg, rgba(255, 0, 0, 0.03), rgba(0, 255, 0, 0.01), rgba(0, 0, 255, 0.03));
            background-size: 100% 4px, 4px 100%;
            z-index: 20; pointer-events: none;
        }

        /* --- BLOCOS SOCIAIS E CAFÉ --- */
        .social-block { grid-column: span 1; display: grid; gap: 10px; }
        .coffee-block {
            grid-column: span 1;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            cursor: pointer;
        }
        .btn-social {
            width: 100%; padding: 14px;
            border-radius: 18px;
            color: white; text-decoration: none;
            font-weight: bold; font-size: 14px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
            transition: 0.3s;
        }
        .insta { background: linear-gradient(45deg, #f09433, #e6683c, #dc2743, #cc2366, #bc1888); }
        .whats { background: #25D366; }
        .btn-social:hover { transform: scale(1.05); filter: brightness(1.2); }

        #coffee-val { font-size: 28px; font-weight: 800; color: #6f4e37; text-shadow: 0 0 10px rgba(111, 78, 55, 0.5); }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div class="bento-container">
    <div class="bento-card profile-block">
        <div class="badges-row">
            <span id="b-1" class="badge" title="Viciado em Café">☕</span>
            <span id="b-2" class="badge" title="Piloto de Fuga">🏆</span>
            <span id="b-3" class="badge" title="Influencer">📱</span>
        </div>
        <div class="profile-img-wrapper">
            <img src="20260207_132012[1].jpg" class="profile-img" onclick="changeTheme()" alt="Charlys">
        </div>
        <h1 style="letter-spacing: 2px;">CHARLYS</h1>
        <p style="color: var(--secondary); font-size: 13px; font-weight: bold; margin-bottom: 10px;">@inimigo_do_amigo.ofc</p>
        <p style="font-size: 13px; opacity: 0.8; line-height: 1.6;">
            Piloto de Titan 98. Amante de ETS2 & GTA V. <br>
            <b>"O segredo é acelerar e não olhar pra trás."</b>
        </p>
    </div>

    <div class="bento-card game-block" id="game-trigger">
        <div id="game-canvas-container">
            <div id="game-overlay">
                <span>INICIAR CORRIDA</span>
                <small style="color: #888; font-size: 10px; margin-top: 5px;">RECORDE: <span id="hi-score">0</span> KM</small>
            </div>
            <div class="scanlines"></div>
            <div id="game-score" style="position: absolute; top: 15px; left: 20px; font-weight: 900; z-index: 25; font-size: 18px;">0 KM</div>
            <div id="road-anim" class="road-line"></div>
            <div id="player-sprite">🏍️</div>
            <div id="obstacle-sprite">🚧</div>
        </div>
    </div>

    <div class="social-block">
        <div class="bento-card" style="padding: 10px;">
            <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="btn-social insta" onclick="track('insta')">
                <i class="fab fa-instagram"></i> INSTA
            </a>
        </div>
        <div class="bento-card" style="padding: 10px;">
            <a href="https://wa.me/5569992919920" target="_blank" class="btn-social whats" onclick="track('whats')">
                <i class="fab fa-whatsapp"></i> WHATS
            </a>
        </div>
    </div>

    <div class="bento-card coffee-block" onclick="incrementCoffee()">
        <span style="font-size: 35px; margin-bottom: 5px;">☕</span>
        <span id="coffee-val">0</span>
        <span style="font-size: 10px; font-weight: bold; opacity: 0.6; letter-spacing: 1px;">CAFÉS</span>
    </div>
</div>

<script>
    /* --- ENGINE DE FUNDO (PARTÍCULAS PARALLAX) --- */
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let dots = [];
    const mouse = { x: null, y: null };

    window.addEventListener('mousemove', (e) => { mouse.x = e.x; mouse.y = e.y; });
    window.addEventListener('resize', initCanvas);

    function initCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        dots = [];
        for(let i=0; i<80; i++) dots.push(new Dot());
    }

    class Dot {
        constructor() {
            this.x = Math.random() * canvas.width;
            this.y = Math.random() * canvas.height;
            this.baseX = this.x; this.baseY = this.y;
            this.size = 1.5;
            this.speed = (Math.random() * 2) + 1;
        }
        update() {
            let dx = mouse.x - this.x;
            let dy = mouse.y - this.y;
            let dist = Math.sqrt(dx*dx + dy*dy);
            if(dist < 120) {
                this.x -= dx/15; this.y -= dy/15;
            } else {
                if(this.x !== this.baseX) this.x -= (this.x - this.baseX)/20;
                if(this.y !== this.baseY) this.y -= (this.y - this.baseY)/20;
            }
        }
        draw() {
            ctx.fillStyle = 'rgba(255, 255, 255, 0.15)';
            ctx.beginPath(); ctx.arc(this.x, this.y, this.size, 0, Math.PI*2); ctx.fill();
        }
    }

    /* --- ENGINE DO JOGO (60 FPS) --- */
    let isPlaying = false, score = 0, hiScore = localStorage.getItem('charlys_hi') || 0;
    let jumpActive = false, yVelocity = 0, playerY = 0;
    let obsX = -60, gameSpeed = 6;
    
    const gravity = 0.7, jumpPower = -13;
    const playerEl = document.getElementById('player-sprite');
    const obsEl = document.getElementById('obstacle-sprite');
    const roadEl = document.getElementById('road-anim');
    const scoreEl = document.getElementById('game-score');
    const overlay = document.getElementById('game-overlay');

    document.getElementById('hi-score').innerText = hiScore;

    function gameLoop() {
        if(!isPlaying) return;

        // Física do Pulo
        if(jumpActive) {
            yVelocity += gravity;
            playerY -= yVelocity;
            if(playerY <= 0) { playerY = 0; jumpActive = false; yVelocity = 0; }
        }
        playerEl.style.bottom = (15 + playerY) + 'px';

        // Obstáculo & Velocidade
        gameSpeed = 7 + (score / 150);
        obsX += gameSpeed;
        if(obsX > 520) { obsX = -60; score += 10; scoreEl.innerText = score + " KM"; }
        obsEl.style.right = obsX + 'px';

        // Evolução do Veículo
        if(score >= 500) { playerEl.innerText = '🚛'; unlockBadge('b-2'); }
        else if(score >= 200) playerEl.innerText = '🚀';
        else playerEl.innerText = '🏍️';

        // Colisão (Hitbox)
        if(obsX > 325 && obsX < 375 && playerY < 40) { endGame(); return; }

        roadEl.style.left = (-(Date.now() / 10) % 60) + 'px';
        requestAnimationFrame(gameLoop);
    }

    function startGame() {
        isPlaying = true; score = 0; obsX = -60; playerY = 0;
        overlay.style.display = 'none';
        scoreEl.innerText = "0 KM";
        gameLoop();
    }

    function endGame() {
        isPlaying = false;
        if(score > hiScore) { hiScore = score; localStorage.setItem('charlys_hi', hiScore); }
        document.getElementById('hi-score').innerText = hiScore;
        overlay.innerHTML = `GAME OVER<br><span style="font-size:20px">${score} KM</span><br><small>TOQUE PARA RECOMEÇAR</small>`;
        overlay.style.display = 'flex';
    }

    document.getElementById('game-trigger').addEventListener('mousedown', (e) => {
        e.preventDefault();
        if(!isPlaying) startGame();
        else if(!jumpActive) { jumpActive = true; yVelocity = jumpPower; }
    });

    /* --- CONQUISTAS & SISTEMAS --- */
    let coffeeCount = localStorage.getItem('charlys_coffee') || 0;
    let socialClicks = { insta: false, whats: false };

    function incrementCoffee() {
        coffeeCount++;
        localStorage.setItem('charlys_coffee', coffeeCount);
        document.getElementById('coffee-val').innerText = coffeeCount;
        if(coffeeCount >= 50) unlockBadge('b-1');
    }

    function track(platform) {
        socialClicks[platform] = true;
        if(socialClicks.insta && socialClicks.whats) unlockBadge('b-3');
    }

    function unlockBadge(id) { document.getElementById(id).classList.add('unlocked'); }

    function changeTheme() {
        const colors = ['#ff4b2b', '#00d2ff', '#39ff14', '#bc13fe'];
        const randomColor = colors[Math.floor(Math.random() * colors.length)];
        document.documentElement.style.setProperty('--primary', randomColor);
    }

    // Inicialização
    initCanvas();
    animate();
    function animate() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        dots.forEach(d => { d.update(); d.draw(); });
        requestAnimationFrame(animate);
    }
    document.getElementById('coffee-val').innerText = coffeeCount;
    // Checar badges salvos
    if(coffeeCount >= 50) unlockBadge('b-1');
    if(hiScore >= 500) unlockBadge('b-2');
</script>

</body>
</html>
