<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>CHARLYS_GOD_MODE_V12</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@500;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #00f2ff; /* Ciano Inicial */
            --s: #ff0055;
            --bg: #020204;
            --glow: 0 0 20px var(--p);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- BACKGROUND DE PARTÍCULAS INTERATIVAS --- */
        #particles {
            position: fixed; top: 0; left: 0; z-index: -1;
            filter: blur(0.5px);
        }

        /* --- CONTAINER PRINCIPAL --- */
        .master-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 10px;
            gap: 10px;
            max-width: 1000px;
            margin: 0 auto;
            width: 100%;
        }

        header {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--p);
            padding: 10px;
            text-align: center;
            box-shadow: var(--glow);
            border-radius: 4px;
        }

        /* --- PERFIL E CONTROLE DE COR --- */
        .profile-box {
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 10px;
        }

        .photo-trigger {
            width: 140px; height: 140px;
            border: 3px solid var(--p);
            border-radius: 50%;
            padding: 5px;
            cursor: pointer;
            box-shadow: var(--glow);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            position: relative;
        }

        .photo-trigger:active { transform: scale(0.9); }
        .photo-trigger img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        /* --- BOTÕES CYBER --- */
        .actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            width: 100%;
            margin-top: 15px;
        }

        .btn-link {
            background: rgba(0,0,0,0.6);
            border: 1px solid var(--p);
            color: var(--p);
            padding: 12px;
            text-decoration: none;
            text-align: center;
            font-family: 'Orbitron';
            font-size: 10px;
            transition: 0.3s;
            box-shadow: inset 0 0 10px rgba(0, 242, 255, 0.1);
        }

        .btn-link:hover { background: var(--p); color: #000; box-shadow: 0 0 25px var(--p); }

        /* --- JOGO TITAN (TOTALMENTE TOUCH) --- */
        .game-area {
            flex: 1;
            background: #000;
            border: 2px solid var(--p);
            border-radius: 8px;
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px rgba(0,0,0,0.5);
        }

        #game-canvas { width: 100%; height: 100%; touch-action: none; }

        .hud {
            position: absolute; top: 10px; width: 100%;
            display: flex; justify-content: space-around;
            font-family: 'Orbitron'; font-size: 12px; pointer-events: none;
            text-shadow: 0 0 10px var(--p);
        }

        /* --- PLAYER DE MÚSICA --- */
        .music-bar {
            background: rgba(0,0,0,0.9);
            border-top: 1px solid var(--p);
            padding: 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 15px;
        }

        .play-btn {
            background: var(--p);
            color: #000;
            border: none;
            width: 40px; height: 40px;
            border-radius: 50%;
            cursor: pointer;
            font-size: 18px;
            box-shadow: var(--glow);
        }

        .boot-screen {
            position: absolute; inset: 0; background: rgba(0,0,0,0.95);
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100;
        }
    </style>
</head>
<body onload="init()">

    <canvas id="particles"></canvas>

    <div class="master-container">
        <header>
            <h1 style="font-family: 'Orbitron'; font-size: 12px; letter-spacing: 4px; color: var(--p);">CHARLYS_ULTIMATE_V12</h1>
        </header>

        <section class="profile-box">
            <div class="photo-trigger" onclick="swapTheme()" id="myPhoto">
                <img src="20260207_132012[1].jpg" alt="Charlys">
            </div>
            <h2 style="font-family: 'Orbitron'; margin-top: 10px; font-size: 1.2rem;">CHARLYS</h2>
            
            <div class="actions">
                <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="btn-link"><i class="fab fa-instagram"></i> INSTA</a>
                <a href="https://wa.me/5569992919920" target="_blank" class="btn-link"><i class="fab fa-whatsapp"></i> WHATS</a>
            </div>
        </section>

        <div class="game-area" id="gameFrame">
            <div class="hud">
                <div>SCORE: <span id="score">0000</span></div>
                <div id="status" style="color:var(--s)">STANDBY</div>
            </div>
            <canvas id="game-canvas"></canvas>
            
            <div id="boot" class="boot-screen">
                <h2 style="font-family:'Orbitron'; color: var(--p); margin-bottom: 20px;">SYSTEM READY</h2>
                <button onclick="startEngine()" class="btn-link" style="width: 200px;">INICIAR MOTOR</button>
                <p style="font-size: 8px; margin-top: 10px; opacity: 0.5;">[ TOQUE NA TELA PARA PULAR ]</p>
            </div>
        </div>

        <div class="music-bar">
            <button class="play-btn" onclick="toggleMusic()" id="mBtn"><i class="fas fa-play"></i></button>
            <div style="font-size: 10px;">
                <div style="color:var(--p)">RADIO_SYNTH_WAVE</div>
                <div style="opacity: 0.5;">LIVE_STREAMING_V12</div>
            </div>
            <audio id="player" loop src="https://stream.nightride.fm/nightride.mp3"></audio>
        </div>
    </div>

    <script>
        // --- MOTOR DE PARTÍCULAS ---
        const pCanvas = document.getElementById('particles');
        const pCtx = pCanvas.getContext('2d');
        let parts = [];
        let themes = ['#00f2ff', '#ff0055', '#bcff00', '#ffaa00'];
        let tIdx = 0;

        function init() {
            pCanvas.width = window.innerWidth; pCanvas.height = window.innerHeight;
            parts = [];
            for(let i=0; i<100; i++) parts.push({x: Math.random()*pCanvas.width, y: Math.random()*pCanvas.height, s: Math.random()*2, vx: Math.random()-0.5, vy: Math.random()-0.5});
            animate();
        }

        function animate() {
            pCtx.fillStyle = 'rgba(2, 2, 4, 0.1)'; pCtx.fillRect(0,0,pCanvas.width, pCanvas.height);
            pCtx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--p');
            parts.forEach(p => {
                p.x += p.vx; p.y += p.vy;
                if(p.x < 0 || p.x > pCanvas.width) p.vx *= -1;
                if(p.y < 0 || p.y > pCanvas.height) p.vy *= -1;
                pCtx.beginPath(); pCtx.arc(p.x, p.y, p.s, 0, Math.PI*2); pCtx.fill();
            });
            requestAnimationFrame(animate);
        }

        // --- TROCA DE COR NA FOTO ---
        function swapTheme() {
            tIdx = (tIdx + 1) % themes.length;
            document.documentElement.style.setProperty('--p', themes[tIdx]);
            log("Cor do sistema alterada.");
        }

        // --- JOGO TITAN (TOUCH TOTAL) ---
        const gCanvas = document.getElementById('game-canvas');
        const gCtx = gCanvas.getContext('2d');
        let active = false, score = 0, py = 0, pv = 0, obstacles = [], frame = 0;

        function startEngine() {
            active = true; score = 0; obstacles = []; py = 0;
            document.getElementById('boot').style.display = 'none';
            document.getElementById('status').innerText = "LIVE";
            loop();
        }

        function jump() { if(py === 0 && active) pv = -16; }

        // TOQUE NO CELULAR
        document.getElementById('gameFrame').addEventListener('touchstart', (e) => {
            e.preventDefault();
            jump();
        });

        // ESPAÇO NO PC
        window.addEventListener('keydown', (e) => { if(e.code === 'Space') jump(); });

        function loop() {
            if(!active) return;
            gCanvas.width = gCanvas.parentElement.offsetWidth;
            gCanvas.height = gCanvas.parentElement.offsetHeight;
            let floor = gCanvas.height - 40;
            gCtx.clearRect(0,0,gCanvas.width, gCanvas.height);

            pv += 0.8; py += pv;
            if(py > 0) { py = 0; pv = 0; }

            // Desenhar Moto com Brilho Dinâmico
            gCtx.shadowBlur = 15; gCtx.shadowColor = themes[tIdx];
            gCtx.font = "40px Arial";
            gCtx.fillText("🏍️", 50, floor + py);
            gCtx.shadowBlur = 0;

            // Obstáculos
            if(frame % 85 === 0) obstacles.push({x: gCanvas.width});
            obstacles.forEach((o, i) => {
                o.x -= (8 + score/1000);
                gCtx.fillText("🚧", o.x, floor);
                if(o.x > 40 && o.x < 90 && py > -25) {
                    active = false;
                    document.getElementById('boot').style.display = 'flex';
                    document.getElementById('boot').innerHTML = `<h2 style="color:var(--s)">CRASHED</h2><button onclick="startEngine()" class="btn-link">REBOOT</button>`;
                }
                if(o.x < -50) { obstacles.splice(i, 1); score += 100; }
            });

            document.getElementById('score').innerText = score.toString().padStart(4, '0');
            frame++; requestAnimationFrame(loop);
        }

        // --- ÁUDIO ---
        function toggleMusic() {
            const p = document.getElementById('player');
            const b = document.getElementById('mBtn');
            if(p.paused) {
                p.play();
                b.innerHTML = '<i class="fas fa-pause"></i>';
            } else {
                p.pause();
                b.innerHTML = '<i class="fas fa-play"></i>';
            }
        }
    </script>
</body>
</html>
