<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>TITAN_WARP_SPEED_V15</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;800&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #00f2ff;
            --s: #ff0055;
            --bg: #030305;
            --glow: 0 0 25px var(--p);
            --pulse: 1;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        
        body {
            background: var(--bg);
            color: #fff;
            font-family: 'JetBrains Mono', monospace;
            height: 100vh;
            overflow: hidden;
        }

        #particle-canvas { position: fixed; top: 0; left: 0; z-index: -1; }

        .wrapper {
            display: flex; flex-direction: column; height: 100vh;
            padding: 15px; gap: 15px; max-width: 1200px; margin: 0 auto;
            transition: transform 0.5s ease;
        }

        .menu-hidden { transform: translateY(-120%); pointer-events: none; }

        header {
            background: rgba(0,0,0,0.8);
            border: 1px solid var(--p);
            padding: 15px; text-align: center;
            box-shadow: var(--glow); border-radius: 4px;
            transform: scale(var(--pulse));
        }

        .profile-area { display: flex; flex-direction: column; align-items: center; padding: 20px; }

        .photo-frame {
            width: 160px; height: 160px;
            border-radius: 50%;
            border: 4px solid var(--p);
            padding: 5px; cursor: pointer;
            box-shadow: var(--glow);
            transform: scale(var(--pulse));
            transition: border-color 0.3s;
        }

        .photo-frame img { width: 100%; height: 100%; border-radius: 50%; object-fit: cover; }

        .links-grid {
            display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
            width: 100%; margin-top: 20px;
        }

        .cyber-btn {
            background: rgba(0,0,0,0.7); border: 1px solid var(--p);
            color: var(--p); padding: 15px; font-family: 'Orbitron';
            text-decoration: none; text-align: center; font-size: 11px;
            cursor: pointer; transition: 0.3s;
        }

        .cyber-btn:hover { background: var(--p); color: #000; box-shadow: 0 0 30px var(--p); }

        .game-viewport { position: fixed; inset: 0; background: #000; z-index: 100; display: none; }
        #game-canvas { width: 100%; height: 100%; }

        .game-ui {
            position: absolute; top: 20px; width: 100%; padding: 0 30px;
            display: flex; justify-content: space-between; font-family: 'Orbitron';
            pointer-events: none; z-index: 110;
        }

        .exit-btn { position: absolute; bottom: 20px; right: 20px; z-index: 120; font-size: 10px; }

        .overlay {
            position: absolute; inset: 0; background: rgba(0,0,0,0.9);
            display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 130;
        }

        @media (max-width: 768px) { .links-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body onload="initSystem()">

    <canvas id="particle-canvas"></canvas>

    <div class="wrapper" id="mainMenu">
        <header>
            <h1 style="font-family: 'Orbitron'; font-size: 14px; letter-spacing: 5px; color: var(--p);">TITAN_WARP_SPEED // V15</h1>
        </header>

        <section class="profile-area">
            <div class="photo-frame" onclick="changeTheme()" id="mainPhoto">
                <img src="20260207_132012[1].jpg" alt="Charlys">
            </div>
            <h2 style="font-family: 'Orbitron'; margin-top: 15px; letter-spacing: 2px;">CHARLYS</h2>
            
            <div class="links-grid">
                <a href="https://instagram.com/inimigo_do_amigo.ofc" target="_blank" class="cyber-btn"><i class="fab fa-instagram"></i> INSTAGRAM</a>
                <a href="https://wa.me/5569992919920" target="_blank" class="cyber-btn"><i class="fab fa-whatsapp"></i> WHATSAPP</a>
                <a href="https://discord.gg/Hgz4j5XXv" target="_blank" class="cyber-btn"><i class="fab fa-discord"></i> DISCORD</a>
                <div id="radioBtn" onclick="toggleRadio()" class="cyber-btn">
                    <i class="fas fa-broadcast-tower"></i> <span id="radioStatus">RADIO_ON</span>
                </div>
            </div>

            <button onclick="enterGameMode()" class="cyber-btn" style="width: 100%; margin-top: 20px; border-width: 2px; font-weight: 900;">
                <i class="fas fa-rocket"></i> VIAJAR_NA_VELOCIDADE_DO_SOM
            </button>
        </section>
    </div>

    <div class="game-viewport" id="gameScreen">
        <div class="game-ui">
            <div style="color: var(--p);">SCORE: <span id="score">0000</span></div>
            <div style="color: var(--s);">FPS: <span id="fps">120</span></div>
        </div>
        <canvas id="game-canvas"></canvas>
        <button onclick="exitGameMode()" class="cyber-btn exit-btn">SAIR</button>
        <div id="boot" class="overlay">
            <h2 style="font-family:'Orbitron'; color: var(--p); margin-bottom: 20px;">HYPERSPACE_READY</h2>
            <button onclick="startGame()" class="cyber-btn" style="width: 200px;">ENGAGE</button>
        </div>
    </div>

    <audio id="cyberRadio" crossorigin="anonymous" loop>
        <source src="https://stream.nightride.fm/nightride.mp3" type="audio/mpeg">
    </audio>

    <script>
        const radio = document.getElementById('cyberRadio');
        const radioStatus = document.getElementById('radioStatus');
        let radioPlaying = false;
        let audioCtx, analyzer, dataArray, source;

        function setupAudioAnalysis() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            analyzer = audioCtx.createAnalyser();
            source = audioCtx.createMediaElementSource(radio);
            source.connect(analyzer);
            analyzer.connect(audioCtx.destination);
            analyzer.fftSize = 256;
            dataArray = new Uint8Array(analyzer.frequencyBinCount);
            analyze();
        }

        function analyze() {
            analyzer.getByteFrequencyData(dataArray);
            let sum = 0;
            for(let i=0; i<10; i++) sum += dataArray[i];
            let avg = sum / 10;
            let scale = 1 + (avg / 255) * 0.3;
            document.documentElement.style.setProperty('--pulse', scale);
            requestAnimationFrame(analyze);
        }

        function toggleRadio() {
            if (!radioPlaying) {
                if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
                radio.play();
                radioStatus.innerText = "RADIO_ON";
                radioPlaying = true;
            } else {
                radio.pause();
                radioStatus.innerText = "RADIO_OFF";
                radioPlaying = false;
            }
        }

        const pCanvas = document.getElementById('particle-canvas');
        const pCtx = pCanvas.getContext('2d');
        let stars = [];
        const numStars = 200;

        function initStars() {
            pCanvas.width = window.innerWidth;
            pCanvas.height = window.innerHeight;
            stars = [];
            for(let i=0; i<numStars; i++) {
                stars.push({
                    x: Math.random() * pCanvas.width - pCanvas.width/2,
                    y: Math.random() * pCanvas.height - pCanvas.height/2,
                    z: Math.random() * pCanvas.width
                });
            }
        }

        function animateStars() {
            pCtx.fillStyle = "rgba(3, 3, 5, 0.3)";
            pCtx.fillRect(0, 0, pCanvas.width, pCanvas.height);
            let color = getComputedStyle(document.documentElement).getPropertyValue('--p');
            pCtx.fillStyle = color;
            stars.forEach(s => {
                s.z -= 15;
                if(s.z <= 0) s.z = pCanvas.width;
                let sx = (s.x / s.z) * pCanvas.width + pCanvas.width/2;
                let sy = (s.y / s.z) * pCanvas.height + pCanvas.height/2;
                let size = (1 - s.z / pCanvas.width) * 3;
                pCtx.beginPath(); pCtx.arc(sx, sy, size, 0, Math.PI*2); pCtx.fill();
            });
            requestAnimationFrame(animateStars);
        }

        const themes = ['#00f2ff', '#ff0055', '#bcff00', '#ffaa00', '#a200ff'];
        let currentTheme = 0;
        function changeTheme() {
            currentTheme = (currentTheme + 1) % themes.length;
            document.documentElement.style.setProperty('--p', themes[currentTheme]);
        }

        function enterGameMode() {
            const screen = document.getElementById('gameScreen');
            const menu = document.getElementById('mainMenu');
            screen.style.display = 'block';
            menu.classList.add('menu-hidden');
            setTimeout(() => {
                gCanvas.width = window.innerWidth;
                gCanvas.height = window.innerHeight;
            }, 100);
            if (screen.requestFullscreen) screen.requestFullscreen();
        }

        function exitGameMode() {
            playing = false;
            document.getElementById('gameScreen').style.display = 'none';
            document.getElementById('mainMenu').classList.remove('menu-hidden');
            if (document.exitFullscreen) document.exitFullscreen().catch(() => {});
        }

        function initSystem() {
            initStars();
            animateStars();
            window.addEventListener('click', () => {
                if(!radioPlaying) {
                    setupAudioAnalysis();
                    toggleRadio();
                }
            }, { once: true });
        }

        const gCanvas = document.getElementById('game-canvas');
        const gCtx = gCanvas.getContext('2d');
        let playing = false, score = 0, py = 0, pv = 0, obstacles = [], frame = 0;
        let roadOffset = 0;

        function startGame() {
            playing = true; score = 0; obstacles = []; py = 0; pv = 0; roadOffset = 0;
            document.getElementById('boot').style.display = 'none';
            gameLoop();
        }

        function drawRoad(floor, color) {
            gCtx.fillStyle = "rgba(20, 20, 25, 0.8)";
            gCtx.beginPath();
            gCtx.moveTo(0, floor);
            gCtx.lineTo(gCanvas.width, floor);
            gCtx.lineTo(gCanvas.width, gCanvas.height);
            gCtx.lineTo(0, gCanvas.height);
            gCtx.fill();

            gCtx.strokeStyle = color;
            gCtx.lineWidth = 3 * parseFloat(getComputedStyle(document.documentElement).getPropertyValue('--pulse'));
            gCtx.beginPath();
            gCtx.moveTo(0, floor);
            gCtx.lineTo(gCanvas.width, floor);
            gCtx.stroke();

            gCtx.strokeStyle = color;
            gCtx.lineWidth = 1;
            roadOffset += 15;
            if(roadOffset > 100) roadOffset = 0;

            for(let x = -roadOffset; x < gCanvas.width; x += 80) {
                gCtx.beginPath();
                gCtx.globalAlpha = 0.3;
                gCtx.moveTo(x, floor);
                gCtx.lineTo(x - 40, gCanvas.height);
                gCtx.stroke();
                gCtx.globalAlpha = 1;
            }
        }

        function jump() {
            // SÓ PULA SE ESTIVER NO CHÃO (py == 0)
            if(playing && py === 0) {
                pv = -22; 
            }
        }

        function gameLoop() {
            if(!playing) return;
            gCanvas.width = window.innerWidth; 
            gCanvas.height = window.innerHeight;
            
            let floor = gCanvas.height * 0.75; 
            let color = getComputedStyle(document.documentElement).getPropertyValue('--p');
            
            gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
            
            drawRoad(floor, color);

            pv += 1.1; // Gravidade
            py += pv;
            if(py > 0) { py = 0; pv = 0; }

            // Moto
            gCtx.save();
            gCtx.font = "80px Arial";
            gCtx.shadowBlur = 15;
            gCtx.shadowColor = color;
            gCtx.translate(120, floor + py - 5); 
            gCtx.scale(-1, 1);
            gCtx.fillText("🏍️", 0, 0);
            gCtx.restore();

            // Obstáculos
            if(frame % 70 === 0) obstacles.push({ x: gCanvas.width, type: "🚧" });
            
            obstacles.forEach((o, i) => {
                o.x -= 12;
                gCtx.font = "80px Arial";
                gCtx.shadowBlur = 10;
                gCtx.fillText(o.type, o.x, floor - 5);
                
                // Colisão
                if(o.x > 40 && o.x < 130 && py > -60) {
                    playing = false;
                    document.getElementById('boot').style.display = 'flex';
                }
                
                if(o.x < -150) { obstacles.splice(i, 1); score += 100; }
            });

            document.getElementById('score').innerText = score.toString().padStart(4, '0');
            frame++; 
            requestAnimationFrame(gameLoop);
        }

        // Eventos de Toque/Clique corrigidos para chamar a função jump()
        window.addEventListener('touchstart', (e) => { e.preventDefault(); jump(); }, {passive: false});
        window.addEventListener('mousedown', jump);
        window.onresize = () => { initStars(); };
    </script>
</body>
</html>
