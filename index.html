<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Charlys | Ultimate Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --primary: #ff4b2b;
            --secondary: #00d2ff;
            --neon-green: #39ff14;
            --bg: #050505;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background: var(--bg);
            background-image: radial-gradient(circle at 50% 50%, #111 0%, #000 100%);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 0;
        }

        /* Efeito de Borda Neon RGB */
        .card {
            background: rgba(0, 0, 0, 0.8);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            padding: 30px;
            width: 90%;
            max-width: 400px;
            text-align: center;
            position: relative;
            box-shadow: 0 0 20px rgba(255, 75, 43, 0.3);
            border: 2px solid transparent;
            background-clip: padding-box;
            animation: neon-border 5s linear infinite;
        }

        @keyframes neon-border {
            0% { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
            33% { border-color: var(--secondary); box-shadow: 0 0 15px var(--secondary); }
            66% { border-color: var(--neon-green); box-shadow: 0 0 15px var(--neon-green); }
            100% { border-color: var(--primary); box-shadow: 0 0 15px var(--primary); }
        }

        .profile-img {
            width: 120px; height: 120px;
            border-radius: 50%;
            border: 3px solid white;
            object-fit: cover;
            transition: 0.4s;
            cursor: pointer;
        }

        .profile-img:hover { transform: scale(1.1) rotate(5deg); }

        h1 { font-size: 2.5em; text-transform: uppercase; margin: 10px 0; overflow: hidden; border-right: .15em solid var(--secondary); white-space: nowrap; animation: typing 3.5s steps(30, end), blink-caret .5s step-end infinite; }

        @keyframes typing { from { width: 0 } to { width: 100% } }
        @keyframes blink-caret { from, to { border-color: transparent } 50% { border-color: var(--secondary) } }

        .skill-bar { height: 8px; background: #222; border-radius: 4px; margin: 10px 0 15px; overflow: hidden; }
        .skill-progress { height: 100%; background: var(--secondary); box-shadow: 0 0 10px var(--secondary); }

        .links-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 20px; }
        .btn { padding: 12px; border-radius: 10px; text-decoration: none; font-weight: bold; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.3s; }
        .btn-insta { background: #E1306C; }
        .btn-whats { background: #25D366; }
        .btn-yt { background: #ff0000; grid-column: span 2; }
        .btn:hover { filter: brightness(1.3); transform: translateY(-3px); }

        /* Estilos do Minigame */
        #game-container {
            margin-top: 40px;
            width: 90%;
            max-width: 400px;
            background: #111;
            border: 2px solid #333;
            border-radius: 20px;
            overflow: hidden;
            position: relative;
            height: 200px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        #game-canvas { background: #0a0a0a; width: 100%; height: 150px; position: relative; }
        .player { position: absolute; bottom: 10px; left: 20px; font-size: 30px; transition: 0.1s; }
        .obstacle { position: absolute; bottom: 10px; right: -50px; font-size: 25px; }
        .game-info { padding: 5px; font-size: 12px; color: #888; }
    </style>
</head>
<body>

<div class="card">
    <img src="20260207_132012[1].jpg" class="profile-img">
    <h1>CHARLYS</h1>
    <p>@inimigo_do_amigo.ofc</p>
    
    <div style="text-align: left;">
        <span style="font-size: 12px; color: var(--secondary);">LEVEL DE PILOTAGEM (TITAN 98)</span>
        <div class="skill-bar"><div class="skill-progress" style="width: 90%;"></div></div>
        
        <span style="font-size: 12px; color: var(--neon-green);">LEVEL NO EURO TRUCK</span>
        <div class="skill-bar"><div class="skill-progress" style="width: 100%; background: var(--neon-green); box-shadow: 0 0 10px var(--neon-green);"></div></div>
    </div>

    <div class="links-grid">
        <a href="https://instagram.com/inimigo_do_amigo.ofc" class="btn btn-insta" target="_blank"><i class="fab fa-instagram"></i> Insta</a>
        <a href="https://wa.me/5569992919920" class="btn btn-whats" target="_blank"><i class="fab fa-whatsapp"></i> Whats</a>
        <a href="https://youtu.be/7SGmdnFT3oU" class="btn btn-yt" target="_blank"><i class="fab fa-youtube"></i> Ver Gameplay ETS2</a>
    </div>
</div>

<div id="game-container">
    <div class="game-info">MINIGAME: TITAN RIDER (Clica pra Pular)</div>
    <div id="game-canvas" onclick="jump()">
        <div id="player" class="player">🏍️</div>
        <div id="obstacle" class="obstacle">🚧</div>
    </div>
    <div id="score" style="padding: 5px;">Pontos: 0</div>
</div>

<script>
    const player = document.getElementById("player");
    const obstacle = document.getElementById("obstacle");
    const scoreElement = document.getElementById("score");
    let score = 0;

    function jump() {
        if (!player.classList.contains("animate")) {
            player.style.bottom = "80px";
            setTimeout(() => { player.style.bottom = "10px"; }, 500);
        }
    }

    setInterval(() => {
        let obstacleLeft = parseInt(window.getComputedStyle(obstacle).getPropertyValue("right"));
        let playerBottom = parseInt(window.getComputedStyle(player).getPropertyValue("bottom"));

        // Movimento do obstáculo
        let currentRight = parseInt(window.getComputedStyle(obstacle).right);
        if (currentRight > 400) {
            obstacle.style.right = "-50px";
            score++;
            scoreElement.innerHTML = "Pontos: " + score;
        } else {
            obstacle.style.right = (currentRight + 5) + "px";
        }

        // Detector de colisão
        if (currentRight > 320 && currentRight < 360 && playerBottom < 50) {
            alert("Ih, bateu a Titan! Pontos: " + score);
            score = 0;
            scoreElement.innerHTML = "Pontos: 0";
            obstacle.style.right = "-50px";
        }
    }, 20);
</script>

</body>
</html>
